<style>
/* Dark theme - applied on html[data-theme=dark] which beats :root */
html[data-theme="dark"]:root {
    --base-color: #ccc;
    --heading-color: #fff;
    --base-background-color: #0b0b0f;
    --sidebar-background: #0e0e13;
    --sidebar-border-color: rgba(255,255,255,.06);
    --sidebar-nav-link-color--active: #fff;
    --sidebar-name-color: #fff;
    --code-inline-background: rgba(255,255,255,.06);
    --code-inline-color: #ddd;
    --code-block-background: #16161e;
    --blockquote-background: rgba(255,255,255,.02);
    --table-cell-border-color: rgba(255,255,255,.06);
    --search-input-background-color: #141419;
    --search-input-border-color: rgba(255,255,255,.1);
    --search-input-color: #ccc;
    --cover-background-color: #0b0b0f;
    --search-result-keyword-background: rgba(220,38,38,.15);
}
html[data-theme="dark"] .sidebar-nav > ul > li > a { color: #888 !important; }
html[data-theme="dark"] .sidebar-nav li a { color: #777 !important; }
html[data-theme="dark"] .sidebar-nav li a:hover { color: #fff !important; }
html[data-theme="dark"] .sidebar-nav li.active > a { color: #fff !important; }
html[data-theme="dark"] .markdown-section h2 { border-bottom: 1px solid rgba(255,255,255,.06); }
html[data-theme="dark"] .markdown-section h3 { color: #eee; }
html[data-theme="dark"] .markdown-section tr:nth-child(2n) { background: rgba(255,255,255,.03) !important; }
html[data-theme="dark"] .markdown-section tr:hover { background: rgba(255,255,255,.05) !important; }
html[data-theme="dark"] .markdown-section th { color: #fff !important; border-bottom: 2px solid rgba(255,255,255,.1) !important; background: transparent !important; }
html[data-theme="dark"] .markdown-section td { border-color: rgba(255,255,255,.06) !important; color: #bbb !important; }
html[data-theme="dark"] .markdown-section tr { background: transparent !important; }
html[data-theme="dark"] .markdown-section tr:nth-child(2n) { background: rgba(255,255,255,.03) !important; }
html[data-theme="dark"] .markdown-section td code { background: rgba(255,255,255,.08); color: #e8e8e8; }
html[data-theme="dark"] .markdown-section pre { background: #13131a; border: 1px solid rgba(255,255,255,.08); }
html[data-theme="dark"] .markdown-section pre code { color: #abb2bf; }
html[data-theme="dark"] .token.comment { color: #5c6370; }
html[data-theme="dark"] .token.string { color: #98c379; }
html[data-theme="dark"] .token.keyword { color: #c678dd; }
html[data-theme="dark"] .token.function { color: #61afef; }
html[data-theme="dark"] .token.variable { color: #e06c75; }
html[data-theme="dark"] .token.number { color: #d19a66; }
html[data-theme="dark"] .token.operator { color: #56b6c2; }
html[data-theme="dark"] .token.punctuation { color: #888; }
html[data-theme="dark"] .token.property { color: #e06c75; }
html[data-theme="dark"] .token.class-name { color: #e5c07b; }
html[data-theme="dark"] .github-corner svg { fill: #fff; color: #0b0b0f; }
html[data-theme="dark"] .search input { background: #141419 !important; color: #eee !important; border-color: rgba(255,255,255,.12) !important; }
html[data-theme="dark"] .search input::placeholder { color: #666 !important; }
html[data-theme="dark"] .search .clear-button { color: #666; }
html[data-theme="dark"] .search a { color: #ccc !important; }
html[data-theme="dark"] .search .matching-post { border-bottom-color: rgba(255,255,255,.06); }

/* Light theme */
html[data-theme="light"]:root {
    --base-color: #374151;
    --heading-color: #111;
    --base-background-color: #fff;
    --sidebar-background: #f9fafb;
    --sidebar-border-color: #e5e7eb;
    --sidebar-nav-link-color--active: #111;
    --sidebar-name-color: #111;
    --code-inline-background: #f3f4f6;
    --code-inline-color: #1f2937;
    --code-block-background: #1e1e2e;
    --blockquote-background: #f9fafb;
    --table-cell-border-color: #e5e7eb;
    --search-input-background-color: #f3f4f6;
    --search-input-border-color: #d1d5db;
    --search-input-color: #374151;
    --cover-background-color: #fff;
}
html[data-theme="light"] .sidebar-nav > ul > li > a { color: #6b7280 !important; }
html[data-theme="light"] .sidebar-nav li a { color: #6b7280 !important; }
html[data-theme="light"] .sidebar-nav li a:hover { color: #111 !important; }
html[data-theme="light"] .sidebar-nav li.active > a { color: #111 !important; }
html[data-theme="light"] .markdown-section h2 { border-bottom: 1px solid #e5e7eb; }
html[data-theme="light"] .markdown-section h3 { color: #1f2937; }

/* Shared */
:root {
    --base-font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono-font-family: 'JetBrains Mono', Consolas, monospace;
    --base-font-size: 15px;
    --base-line-height: 1.7;
    --link-color: #dc2626;
    --link-color--hover: #ef4444;
    --code-block-border-radius: 10px;
    --blockquote-border-color: #dc2626;
    --notice-tip-border-color: #22c55e;
    --notice-important-border-color: #dc2626;
    --sidebar-nav-link-border-color--active: #dc2626;
}
.sidebar .app-name img { height: 28px; }
.sidebar-nav > ul > li > a { font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
.sidebar-nav li a { font-size: 14px; }
.sidebar-nav li.active > a { font-weight: 600; }
.markdown-section h1 { font-size: 32px; font-weight: 700; letter-spacing: -.02em; }
.markdown-section h2 { font-size: 22px; font-weight: 700; padding-bottom: 8px; }
.markdown-section h3 { font-size: 17px; font-weight: 600; }
.markdown-section table { font-size: 14px; }
.markdown-section th { font-weight: 600; }
.markdown-section code { font-size: 13px; }
.markdown-section pre>code { font-size: 13px; }
.theme-btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; transition: .15s; position: fixed; bottom: 16px; right: 16px; z-index: 50; color: var(--base-color); background: var(--sidebar-background); border: 1px solid var(--sidebar-border-color); }
.theme-btn:hover { opacity: .8; }
</style>
<script>
// Apply theme BEFORE page renders to avoid flash
(function(){
    var t = localStorage.getItem('docs-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
})();
</script>

function getTheme() { return localStorage.getItem('docs-theme') || 'dark'; }
function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-icon').textContent = t === 'dark' ? '☀️' : '🌙';
    document.getElementById('theme-label').textContent = t === 'dark' ? 'Light' : 'Dark';
    var img = document.querySelector('.sidebar .app-name img');
    if (img) img.src = t === 'light' ? _logoDark : _logoLight;
}
function toggleTheme() {
    var t = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('docs-theme', t);
    applyTheme(t);
}
applyTheme(getTheme());

var _obs = new MutationObserver(function() {
    var img = document.querySelector('.sidebar .app-name img');
    if (img) { img.src = getTheme() === 'light' ? _logoDark : _logoLight; _obs.disconnect(); }
});
